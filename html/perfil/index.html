<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Perfil | QU4SAR</title>
<link rel="icon" type="image/x-icon" href="../../img/QU4SAR.ico">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Inter:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/global.css"><link rel="stylesheet" href="../../css/perfil/index.css">
<script src="https://unpkg.com/lucide@latest"></script>
  <script>
    setTimeout(function(){ var e=document.getElementById('loadingOverlay'); if(e) e.classList.add('hidden'); }, 3500);
  </script>
</head>
<body>
<div id="loadingOverlay"><div class="loader-ring"><img src="../../img/QU4SAR.ico" alt="QU4SAR" class="loader-icon"></div></div>
<div class="dash-layout">
  <aside class="sidebar" id="sidebar"><div class="sidebar-brand"><img src="../../img/QU4SAR.ico" alt="" class="sidebar-logo"><span class="sidebar-logo-text">QU4SAR</span></div>
    <nav class="sidebar-nav">
      <a href="../alumnos/dashboard.html" class="nav-item"><i data-lucide="layout-dashboard" size="18"></i><span>Visión General</span></a>
      <a href="#" class="nav-item active"><i data-lucide="user" size="18"></i><span>Perfil</span></a>
      <a href="../pagos/index.html" class="nav-item"><i data-lucide="credit-card" size="18"></i><span>Pagos</span></a>
    </nav>
    <div class="sidebar-footer"><a href="#" class="nav-item" id="logoutBtn"><i data-lucide="log-out" size="18"></i><span>Cerrar Sesión</span></a></div>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle"><i data-lucide="menu" size="20"></i></button>
      <div class="topbar-left"><span class="topbar-title">Perfil</span></div>
      <div class="topbar-right"><div class="topbar-user"><div class="user-avatar" id="userAvatar">Q</div><div class="user-info"><span class="user-name" id="userName">Cargando...</span><span class="user-role">student</span></div></div></div>
    </header>
    <div class="content">
      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">Q</div>
        <h2 class="profile-name" id="profileName">Cargando...</h2>
        <p class="profile-rank" id="profileRank">-</p>
        <div class="profile-info">
          <div class="profile-field"><label>Email</label><span id="profileEmail">-</span></div>
          <div class="profile-field"><label>Discord</label><span id="profileDiscord">-</span></div>
          <div class="profile-field"><label>VALORANT</label><span id="profileValorant">-</span></div>
          <div class="profile-field"><label>Rango</label><span id="profileValRank">-</span></div>
          <div class="profile-field"><label>Rol</label><span id="profileRole">-</span></div>
          <div class="profile-field"><label>Servidor</label><span id="profileServer">-</span></div>
          <div class="profile-field"><label>Disponibilidad</label><span id="profileAvail">-</span></div>
          <div class="profile-field"><label>Miembro desde</label><span id="profileSince">-</span></div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../../javascript/supabase.js"></script>
<script src="../../javascript/perfil/index.js"></script>
</body>
</html>
