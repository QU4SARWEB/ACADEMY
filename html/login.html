<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QU4SAR | Iniciar Sesión</title>
  <link rel="icon" type="image/x-icon" href="../img/QU4SAR.ico">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css?v=2">
  <script>setTimeout(function(){var e=document.getElementById('loadingOverlay');if(e)e.classList.add('hidden')},3500);</script>
</head>
<body>
  <div id="loadingOverlay"><div class="loader-ring"><img src="../img/QU4SAR.ico" alt="QU4SAR" class="loader-icon"></div></div>
  <div class="login-page">
    <div class="login-hero">
      <a href="../index.html" class="login-logo">
        <img src="../img/QU4SAR.ico" alt="QU4SAR" class="login-logo-icon">
        <span class="login-logo-text">QU4SAR</span>
      </a>
      <h1 class="login-hero-title">Bienvenido de vuelta</h1>
      <p class="login-hero-sub">Inicia sesión para acceder a tu entrenamiento</p>
    </div>

    <div class="login-container">
      <div class="login-card">
        <form id="loginForm" class="login-form">
          <div class="form-field">
            <label for="login_email">Correo electrónico</label>
            <input type="email" id="login_email" class="input-field" placeholder="tu@correo.com" required autocomplete="email">
          </div>

          <div class="form-field">
            <label for="login_password">Contraseña</label>
            <div class="password-wrapper">
              <input type="password" id="login_password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" class="password-toggle" id="pwToggle" tabindex="-1">
                <i data-lucide="eye" size="18"></i>
              </button>
            </div>
          </div>

          <div class="form-msg" id="loginMsg"></div>

          <button type="submit" class="btn-primary" id="loginBtn">
            <span class="btn-text">INICIAR SESIÓN</span>
            <svg class="btn-loader" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
          </button>

          <div class="login-links">
            <a href="#" id="forgotLink">¿Olvidaste tu contraseña?</a>
            <a href="register.html">¿No tienes cuenta? Inscríbete</a>
          </div>
        </form>
      </div>
    </div>

    <div class="login-footer">
      <a href="../index.html">← Volver al inicio</a>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../javascript/supabase.js?v=2"></script>
  <script src="../javascript/login.js?v=2"></script>
</body>
</html>
